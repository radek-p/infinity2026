<div class="footer__counter">
  <div id="infinity-counter">
    <span id="counter-value">\( 0 / \infty \)</span>
    <button id="increment-button" class="button button--small">Increment to Infinity</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const counterValue = document.getElementById('counter-value');
    const incrementButton = document.getElementById('increment-button');
    const apiEndpoint = 'https://infinity-2026-counter.radek25c-cloudflare.workers.dev';

    const WORKSHOP_DATE = new Date('2026-07-06T00:00:00Z');

    function isWorkshopDay() {
        const now = new Date();
        return now.getUTCFullYear() === WORKSHOP_DATE.getUTCFullYear() &&
               now.getUTCMonth() === WORKSHOP_DATE.getUTCMonth() &&
               now.getUTCDate() === WORKSHOP_DATE.getUTCDate();
    }

    function formatCounter(value) {
        if (isWorkshopDay()) {
            return '\\( \\infty / \\infty \\)';
        }
        return `\\( ${value} / \\infty \\)`;
    }

    async function fetchCounter() {
        try {
            const response = await fetch(apiEndpoint);
            const data = await response.json();
            counterValue.innerText = formatCounter(data.count);
            if (window.renderMathInElement) {
                renderMathInElement(counterValue);
            }
        } catch (error) {
            console.error('Failed to fetch counter:', error);
        }
    }

    async function incrementCounter() {
        incrementButton.disabled = true;
        try {
            const response = await fetch(apiEndpoint, { method: 'POST' });
            const data = await response.json();
            counterValue.innerText = formatCounter(data.count);
            if (window.renderMathInElement) {
                renderMathInElement(counterValue);
            }
        } catch (error) {
            console.error('Failed to increment counter:', error);
        } finally {
            incrementButton.disabled = false;
        }
    }

    incrementButton.addEventListener('click', incrementCounter);

    // Initial fetch
    fetchCounter();
});
</script>

<style>
.footer__counter {
  margin-top: 1rem;
  text-align: center;
}
#infinity-counter {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 1rem;
}
#counter-value {
  font-size: 1.2rem;
  min-height: 1.5em;
}
.button--small {
  padding: 5px 10px;
  font-size: 0.8rem;
  cursor: pointer;
}
</style>
